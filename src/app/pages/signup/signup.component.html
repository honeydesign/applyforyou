<div class="signup-page">

  <div class="logo-wrap">
    <a routerLink="/" class="logo-box">
      <svg width="36" height="36" viewBox="0 0 44 44" fill="none">
        <rect x="4" y="8" width="18" height="24" rx="4" fill="white" opacity="0.95"/>
        <line x1="9" y1="15" x2="17" y2="15" stroke="#7C3AED" stroke-width="2" stroke-linecap="round"/>
        <line x1="9" y1="20" x2="17" y2="20" stroke="#7C3AED" stroke-width="2" stroke-linecap="round"/>
        <line x1="9" y1="25" x2="13" y2="25" stroke="#7C3AED" stroke-width="2" stroke-linecap="round"/>
        <path d="M24 30 L24 16 Q24 12 28 11 Q32 10 32 14 L32 16 Q34 16 34 20 L34 24 Q34 28 30 29 L24 30 Z" fill="#C4B5FD" stroke="#7C3AED" stroke-width="0.5"/>
        <line x1="28" y1="16" x2="28" y2="28" stroke="#7C3AED" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
        <line x1="8" y1="34" x2="3" y2="34" stroke="#C4B5FD" stroke-width="2" stroke-linecap="round"/>
        <line x1="8" y1="38" x2="2" y2="38" stroke="#C4B5FD" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </a>
    <div class="logo-name">Apply<span>For</span>You</div>
  </div>

  <div class="card">
    <h1>Create your account</h1>
    <p class="sub">Already have an account? <a routerLink="/login">Log in</a></p>

    <button class="btn-google" type="button">
      <svg width="16" height="16" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider-row"><hr/><span>or sign up with email</span><hr/></div>

    <div class="form-row">
      <div class="field">
        <label for="firstName">First name</label>
        <input id="firstName" type="text" placeholder="Chidi"/>
      </div>
      <div class="field">
        <label for="lastName">Last name</label>
        <input id="lastName" type="text" placeholder="Okafor"/>
      </div>
    </div>

    <div class="field">
      <label for="email">Email address</label>
      <input id="email" type="email" placeholder="chidi@email.com"/>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="password-wrap">
        <input id="password" [type]="showPassword ? 'text' : 'password'" placeholder="Min. 8 characters"/>
        <button class="eye-btn" type="button" (click)="togglePassword()">
          <svg *ngIf="!showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
          <svg *ngIf="showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-signup" type="button" routerLink="/onboarding">Create free account →</button>

    <p class="terms">
      By signing up you agree to our
      <a routerLink="/terms">Terms</a> and
      <a routerLink="/privacy">Privacy Policy</a>
    </p>
  </div>

</div>
